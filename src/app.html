<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Find the right AI model for every task. Real responses, side-by-side comparisons, no synthetic benchmarks." />
		<meta property="og:title" content="Model Quest — AI Model Benchmarks" />
		<meta property="og:description" content="Real responses. Side-by-side comparisons. No synthetic benchmarks — just the outputs that matter." />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />

		<!-- Google Fonts: preconnect for performance -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

		<!-- Theme initializer: runs before Svelte mounts to avoid FOUC -->
		<script>
			(function() {
				try {
					var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
				} catch(e) {}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
